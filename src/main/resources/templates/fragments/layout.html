<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="site-header">
    <a class="brand" th:href="@{/}">🛹 Skate City</a>
    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/productos}">Catálogo</a>
        <a th:href="@{/carrito}">Carrito</a>
        <a th:href="@{/pedido}">Pedido</a>
    </nav>
    <a class="cart-pill" th:href="@{/carrito}">Carrito <span id="cart-count" th:text="${cantidadCarrito}">0</span></a>
</header>

<footer th:fragment="footer" class="site-footer">
    <p>Skate City · Miniproyecto Tienda Web Express</p>
</footer>
</body>
</html>
