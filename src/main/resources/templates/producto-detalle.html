<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.nombre + ' | Skate City'}"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main>
    <section class="detail-layout">
        <div class="detail-media">
            <img class="detail-image" th:src="${producto.imagen}" th:alt="${producto.nombre}">
        </div>
        <div class="detail-content">
            <p class="eyebrow" th:text="${producto.categoria.nombre}"></p>
            <h1 class="detail-title" th:text="${producto.nombre}"></h1>
            <p class="detail-description" th:text="${producto.descripcion}"></p>
            <p class="price" th:text="${'$' + producto.precio}"></p>
            <p class="stock" th:text="${producto.disponibilidad}"></p>
            <form class="detail-cart-panel"
                  th:action="@{/carrito/agregar/{id}(id=${producto.id})}"
                  method="post"
                  data-product-detail-cart>
                <div>
                    <span class="catalog-chip-label">Cantidad a agregar</span>
                    <div class="quantity-stepper">
                        <button type="button" data-detail-decrease aria-label="Disminuir cantidad">-</button>
                        <input type="number" name="cantidad" min="1" value="1" inputmode="numeric" data-detail-quantity>
                        <button type="button" data-detail-increase aria-label="Aumentar cantidad">+</button>
                    </div>
                </div>
                <div class="detail-cart-status">
                    <span>En carrito</span>
                    <strong data-product-current-quantity th:text="${cantidadEnCarrito}">0</strong>
                </div>
                <div class="card-actions">
                    <button class="button" type="submit">Agregar al carrito</button>
                    <a class="button secondary" th:href="@{/carrito}">Ver carrito</a>
                </div>
            </form>
            <div class="card-actions">
                <a class="button secondary" th:href="@{/pedido(productoId=${producto.id})}">Solicitar producto</a>
            </div>
        </div>
    </section>
</main>

<div id="toast" class="toast" hidden>Producto agregado correctamente</div>
<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
