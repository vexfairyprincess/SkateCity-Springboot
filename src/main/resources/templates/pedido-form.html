<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido | Skate City</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main>
    <section class="form-card">
        <p class="eyebrow">Pedido</p>
        <h1>Solicitar producto</h1>
        <form id="pedido-form" th:action="@{/pedido}" th:object="${pedidoForm}" method="post" novalidate>
            <label>
                Nombre del cliente
                <input type="text" th:field="*{nombreCliente}">
                <small th:if="${#fields.hasErrors('nombreCliente')}" th:errors="*{nombreCliente}"></small>
            </label>
            <label>
                Correo
                <input type="email" th:field="*{correo}">
                <small th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></small>
            </label>
            <label>
                Producto
                <select th:field="*{productoId}">
                    <option value="">Selecciona un producto</option>
                    <option th:each="producto : ${productos}" th:value="${producto.id}" th:text="${producto.nombre + ' - $' + producto.precio}"></option>
                </select>
                <small th:if="${#fields.hasErrors('productoId')}" th:errors="*{productoId}"></small>
            </label>
            <label>
                Cantidad
                <input type="number" min="1" th:field="*{cantidad}">
                <small th:if="${#fields.hasErrors('cantidad')}" th:errors="*{cantidad}"></small>
            </label>
            <label>
                Comentario o dirección
                <textarea th:field="*{comentario}" rows="4"></textarea>
            </label>
            <button class="button" type="submit">Enviar pedido</button>
        </form>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
