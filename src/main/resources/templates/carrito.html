<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito | Skate City</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main>
    <section class="cart-shell">
        <div class="cart-heading">
            <div>
                <p class="eyebrow">Carrito de compras</p>
                <h1>Productos seleccionados</h1>
            </div>
            <a class="button secondary" th:href="@{/productos}">Seguir comprando</a>
        </div>

        <div class="alert alert-success" th:if="${mensajeCarrito}" th:text="${mensajeCarrito}" data-cart-message></div>
        <div class="alert alert-success" hidden data-cart-message></div>

        <div class="catalog-empty" data-cart-empty th:hidden="${!carritoVacio}">
            <h3>Tu carrito está vacío.</h3>
            <p>Agrega productos desde el catálogo para simular tu compra.</p>
        </div>

        <div class="cart-layout" data-cart-layout th:hidden="${carritoVacio}">
            <div class="table-responsive cart-table-wrap">
                <table class="table table-dark table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Producto</th>
                        <th class="text-end">Precio</th>
                        <th class="text-center">Cantidad</th>
                        <th class="text-end">Subtotal</th>
                        <th class="text-end">Acción</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${items}" th:attr="data-cart-row=${item.productoId}">
                        <td>
                            <div class="cart-product">
                                <img th:src="${item.imagen}" th:alt="${item.nombre}">
                                <span th:text="${item.nombre}"></span>
                            </div>
                        </td>
                        <td class="text-end" th:text="${'$' + item.precio}"></td>
                        <td class="text-center">
                            <div class="cart-quantity-control">
                                <button type="button"
                                        th:attr="data-cart-action=@{/carrito/disminuir/{id}(id=${item.productoId})}"
                                        aria-label="Disminuir cantidad">-</button>
                                <strong data-cart-item-quantity th:text="${item.cantidad}"></strong>
                                <button type="button"
                                        th:attr="data-cart-action=@{/carrito/aumentar/{id}(id=${item.productoId})}"
                                        aria-label="Aumentar cantidad">+</button>
                            </div>
                        </td>
                        <td class="text-end fw-semibold" data-cart-item-subtotal th:text="${'$' + item.subtotal}"></td>
                        <td class="text-end">
                            <form th:action="@{/carrito/eliminar/{id}(id=${item.productoId})}" method="post" data-cart-remove-form>
                                <button class="btn btn-outline-light btn-sm" type="submit">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <aside class="cart-summary">
                <span>Total general</span>
                <strong data-cart-total th:text="${'$' + total}"></strong>
                <form th:action="@{/carrito/finalizar}" method="post" data-cart-finalize-form>
                    <button class="button w-100" type="submit">Finalizar pedido</button>
                </form>
            </aside>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
